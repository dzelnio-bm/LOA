<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lincoln Ostomy Association</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="content.js"></script>
  <style>
    :root {
      --blue-dark:   #0e5a84;
      --blue-mid:    #1a7ab5;
      --blue-light:  #d6eef9;
      --blue-pale:   #f0f8fd;
      --accent:      #e8a020;
      --text-dark:   #162530;
      --text-mid:    #2e4e62;
      --text-light:  #5a7a8e;
      --white:       #ffffff;
      --shadow:      0 2px 12px rgba(14,90,132,0.10);
      --radius:      10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 400;
      background: var(--blue-pale);
      color: var(--text-dark);
      line-height: 1.6;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-mid) 100%);
      color: white;
      padding: 0 30px;
    }
    .header-inner {
      max-width: 1140px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      line-height: 1.2;
    }
    .header-brand p {
      font-size: 0.82rem;
      opacity: 0.78;
      margin-top: 2px;
      font-weight: 300;
      letter-spacing: 0.5px;
    }
    .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .header-actions a {
      font-size: 0.82rem;
      color: var(--blue-light);
      text-decoration: none;
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .header-actions a:hover { background: rgba(255,255,255,0.15); color: white; }
    .header-actions a.cta {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      font-weight: 600;
    }
    .header-actions a.cta:hover { background: #d09010; }

    /* ── NAV ── */
    nav {
      background: var(--blue-dark);
      border-top: 1px solid rgba(255,255,255,0.12);
    }
    .nav-inner {
      max-width: 1140px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
    }
    nav a {
      color: rgba(255,255,255,0.80);
      text-decoration: none;
      padding: 11px 18px;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: all 0.2s;
      display: block;
      border-bottom: 3px solid transparent;
    }
    nav a:hover { color: white; border-bottom-color: var(--accent); }

    /* ── PAGE WRAP ── */
    .page-wrap {
      max-width: 1140px;
      margin: 28px auto;
      padding: 0 16px;
      display: flex;
      gap: 26px;
      align-items: flex-start;
    }
    main { flex: 1; min-width: 0; }

    /* ── MEETING BANNER ── */
    .meeting-banner {
      background: linear-gradient(135deg, var(--blue-dark) 0%, #1e8dc9 100%);
      color: white;
      border-radius: var(--radius);
      padding: 26px 28px;
      margin-bottom: 22px;
      position: relative;
      overflow: hidden;
    }
    .meeting-banner::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
    }
    .meeting-banner::after {
      content: '';
      position: absolute;
      bottom: -60px; right: 60px;
      width: 240px; height: 240px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }

      font-family: 'Playfair Display', serif;
      font-size: 1.45

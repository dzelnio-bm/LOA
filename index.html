<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lincoln Ostomy Association</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue-dark:  #0e5a84;
      --blue-mid:   #1a7ab5;
      --blue-light: #d6eef9;
      --blue-pale:  #f0f8fd;
      --accent:     #e8a020;
      --text-dark:  #162530;
      --text-mid:   #2e4e62;
      --text-light: #5a7a8e;
      --white:      #ffffff;
      --shadow:     0 2px 12px rgba(14,90,132,0.10);
      --radius:     10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--blue-pale);
      color: var(--text-dark);
      line-height: 1.6;
    }
    header {
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-mid) 100%);
      color: white;
    }
    .header-inner {
      max-width: 1140px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-logo { height: 58px; width: auto; border-radius: 6px; }
    .header-brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      font-weight: 700;
      line-height: 1.2;
    }
